  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+ ' diff';\n        const teeOptions = dc ? dc.tees.map(t => ({ id: t.id, label: t.name,\n          bg: t.id === gTeeId ? ACC : 'var(--fw-card)', fg: t.id === gTeeId ? '#fff' : 'var(--fw-mid)', border: t.id === gTeeId ? ACC : 'var(--fw-border2)',\n          onSelect: () => this.setGolferTee(gid, t.id) })) : [];\n        const rid = (this.state.editSessionIds || {})[gid];\n        const rnd = rid ? data.rounds.find(r => r.id === rid) : null;\n        const hs = (rnd && Array.isArray(rnd.holeScores) && rnd.holeScores.length) ? rnd.holeScores : null;\n        const anyFir = hs ? hs.some(h => h && h.fir != null) : false;\n        const anyGir = hs ? hs.some(h => h && h.gir != null) : false;\n        const anyPutts = hs ? hs.some(h => h && h.putts != null) : false;\n        const firN = hs ? hs.filter(h => h && h.fir === true).length : 0;\n        const girN = hs ? hs.filter(h => h && h.gir === true).length : 0;\n        const puttsN = hs ? hs.reduce((a, h) => a + ((h && h.putts) || 0), 0) : 0;\n        const hasStats = !!(anyFir || anyGir || anyPutts);\n        return { name: g ? g.name : '?', value: val, diffLabel, teeId: gTeeId || '', teeOptions, onTee: e => this.setGolferTee(gid, e.target.value), drinks: dr.drinks[gid] || 0, onInput: e => this.setGolferScore(gid, e.target.value), onMinus: () => this.setGolferDrinks(gid, -1), onPlus: () => this.setGolferDrinks(gid, 1), hasStats, statFir: anyFir ? String(firN) : '—', statGir: anyGir ? String(girN) : '—', statPutts: anyPutts ? String(puttsN) : '—' };\n      });\n      const anyScore = dr.golferIds.some(gid => parseInt(dr.scores[gid], 10));\n      if (st === 1) { out.primaryLabel = dr.courseId ? 'Next' : 'Select a course'; out.primaryBg = dr.courseId ? ACC : '#c2ccbf'; out.primaryAction = () => { if (dr.courseId) this.setState({ addStep: 2 }); }; }\n      else if (st === 2) { out.primaryLabel = dr.teeId ? 'Next' : 'Select a tee'; out.primaryBg = dr.teeId ? ACC : '#c2ccbf'; out.primaryAction = () => { if (dr.teeId) this.setState({ addStep: 3 }); }; }\n      else if (st === 3) { out.primaryLabel = dr.golferIds.length ? 'Next' : 'Select golfers'; out.primaryBg = dr.golferIds.length ? ACC : '#c2ccbf'; out.primaryAction = () => { if (dr.golferIds.length) this.setState({ addStep: 4 }); }; }\n      else { out.primaryLabel = this.state.editingId ? 'Save changes' : (dr.golferIds.length > 1 ? 'Save rounds' : 'Save round'); out.primaryBg = anyScore ? ACC : '#c2ccbf'; out.primaryAction = () => this.saveRound(); }\n    }\n\n    if (screen === 'compare') {\n      out.isCompare = true; out.showTabs = true;\n      const mode = this.state.cmpMode;\n      out.cmpAll = mode === 'all'; out.cmpH2h = mode === '1v1';\n      out.setModeAll = () => this.setState({ cmpMode: 'all' });\n      out.setModeH2h = () => this.setState({ cmpMode: '1v1' });\n      out.modeAllBg = mode === 'all' ? '#fff' : 'transparent'; out.modeAllColor = mode === 'all' ? '#14201a' : '#6b7a72';\n      out.modeH2hBg = mode === '1v1' ? '#fff' : 'transparent'; out.modeH2hColor = mode === '1v1' ? '#14201a' : '#6b7a72';\n      const sums = data.golfers.map(g => this.golferSummary(g.id));\n      const ranked = sums.slice().sort((a, b) => { if (a.index == null) return 1; if (b.index == null) return -1; return a.index - b.index; });\n      const maxIdx = Math.max(1, ...ranked.map(s => s.index || 0));\n      out.leaderboard = ranked.map((s, i) => ({ rank: '' + (i + 1), name: s.name, index: s.index == null ? '—' : s.index.toFixed(1),\n        sub: s.rounds + ' rounds · ' + (s.avg == null ? '—' : s.avg.toFixed(1) + ' avg'),\n        barW: ((s.index || 0) / maxIdx * 100).toFixed(0) + '%', isYou: s.id === data.activeGolferId }));\n      // head to head\n      const ids = data.golfers.map(g => g.id);\n      let a = this.state.cmpA || data.activeGolferId;\n      let b = this.state.cmpB || ids.find(x => x !== a) || a;\n      if (!ids.includes(a)) a = ids[0];\n      if (!ids.includes(b)) b = ids.find(x => x !== a) || a;\n      out.cmpChipsA = data.golfers.map(g => ({ name: g.name, onTap: () => this.setState({ cmpA: g.id }),\n        bg: g.id === a ? ACC : 'var(--fw-card)', fg: g.id === a ? '#fff' : 'var(--fw-mid)', border: g.id === a ? ACC : '#dde3dc' }));\n      out.cmpChipsB = data.golfers.map(g => ({ name: g.name, onTap: () => this.setState({ cmpB: g.id }),\n        bg: g.id === b ? 'oklch(0.82 0.18 123)' : 'var(--fw-card)', fg: g.id === b ? '#0f2417' : 'var(--fw-mid)', border: g.id === b ? 'oklch(0.82 0.18 123)' : '#dde3dc' }));\n      const sa = this.golferSummary(a), sb = this.golferSummary(b);\n      const fmt = (v, d) => v == null ? '—' : v.toFixed(d);\n      const rowsDef = [\n        { label: 'Handicap Index', a: fmt(sa.index, 1), b: fmt(sb.index, 1), av: sa.index, bv: sb.index, lowBetter: true },\n        { label: 'Scoring average', a: fmt(sa.avg, 1), b: fmt(sb.avg, 1), av: sa.avg, bv: sb.avg, lowBetter: true },\n        { label: 'Best differential', a: fmt(sa.best, 1), b: fmt(sb.best, 1), av: sa.best, bv: sb.best, lowBetter: true },\n        { label: 'Low Index', a: fmt(sa.low, 1), b: fmt(sb.low, 1), av: sa.low, bv: sb.low, lowBetter: true },\n        { label: 'Rounds played', a: '' + sa.rounds, b: '' + sb.rounds, av: sa.rounds, bv: sb.rounds, lowBetter: false },\n      ];\n      out.cmpName = sa.name; out.cmpNameB = sb.name;\n      out.cmpRows = rowsDef.map(r => {\n        let aWin = false, bWin = false;\n        if (r.av != null && r.bv != null && r.av !== r.bv) { const aBetter = r.lowBetter ? r.av < r.bv : r.av > r.bv; aWin = aBetter; bWin = !aBetter; }\n        return { label: r.label, a: r.a, b: r.b,\n          aColor: ACC, aWeight: aWin ? '700' : '600',\n          bColor: 'oklch(0.74 0.17 124)', bWeight: bWin ? '700' : '600' };\n      });\n      const va = sa.series.slice(-12).map(s => s.value), vb = sb.series.slice(-12).map(s => s.value);\n      const all = va.concat(vb);\n      if (all.length >= 2) {\n        const mn = Math.min(...all), mx = Math.max(...all), rg = (mx - mn) || 1;\n        const line = (vals) => { if (vals.length < 2) return ''; const step = 320 / (vals.length - 1); return vals.map((v, i) => (i * step).toFixed(1) + ',' + (12 + (mx - v) / rg * 106).toFixed(1)).join(' '); };\n        out.cmpLineA = line(va); out.cmpLineB = line(vb); out.cmpHasChart = (va.length >= 2 || vb.length >= 2);\n      } else { out.cmpLineA = ''; out.cmpLineB = ''; out.cmpHasChart = false; }\n    }\n\n    return out;\n  }\n\n  navItems(active) {\n    const items = [ { key: 'home', label: 'Home' }, { key: 'rounds', label: 'Rounds' }, { key: 'stats', label: 'Stats' }, { key: 'compare', label: 'Compare' }, { key: 'courses', label: 'Courses' } ];\n    const ACC = 'var(--accent,oklch(0.63 0.13 158))';\n    return items.map(it => {\n      const on = active === it.key;\n      return { onClick: () => this.go(it.key),\n        isHome: it.key === 'home', isRounds: it.key === 'rounds', isStats: it.key === 'stats', isCompare: it.key === 'compare', isCourses: it.key === 'courses',\n        color: on ? 'oklch(0.88 0.19 122)' : 'rgba(255,255,255,0.55)' };\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
