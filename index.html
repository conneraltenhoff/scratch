  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

df01ba\" width=\"210\" height=\"210\" style=\"border-radius:50%; display:block;\" alt=\"Scratch\"><\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <!-- status bar (hidden in standalone; real OS status bar shows) -->\n      <div style=\"display:none;\">\n        <span style=\"font-weight:600; font-size:14px;\">9:41<\u002Fspan>\n        <div style=\"display:flex; gap:6px; align-items:center;\">\n          <div style=\"width:18px; height:10px; border:1.5px solid #14201a; border-radius:3px; opacity:0.85;\"><\u002Fdiv>\n          <div style=\"width:15px; height:10px; border-radius:2px; background:#14201a; opacity:0.85;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ============ ROUNDS ============ -->\n      <sc-if value=\"{{ isRounds }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"fw-scroll\" style=\"height:calc(100% - 84px); overflow-y:auto; padding:6px 22px 20px;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:26px; letter-spacing:-0.01em; padding:8px 0 4px;\">Rounds<\u002Fdiv>\n        <div style=\"font-size:13px; color:var(--fw-muted); margin-bottom:14px;\">{{ roundsCountLabel }}<\u002Fdiv>\n        <div style=\"display:flex; gap:8px; overflow-x:auto; padding-bottom:6px;\" class=\"fw-scroll\">\n          <sc-for list=\"{{ filterChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <div onclick=\"{{ c.onClick }}\" style=\"flex:0 0 auto; padding:8px 15px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; background:{{ c.bg }}; color:{{ c.fg }}; border:1px solid {{ c.border }};\">{{ c.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; background:var(--fw-card); border-radius:16px; box-shadow:0 1px 3px rgba(20,32,26,0.05); overflow:hidden; margin-top:14px;\">\n          <sc-for list=\"{{ filtered }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div onclick=\"{{ r.onEdit }}\" style=\"display:flex; justify-content:space-between; align-items:center; height:70.5px; box-sizing:border-box; padding:0 16px; border-top:{{ r.bt }}; cursor:pointer;\">\n              <div style=\"min-width:0;\">\n                <div style=\"display:flex; align-items:center; gap:7px;\"><div style=\"font-weight:600; font-size:15px;\">{{ r.courseName }}<\u002Fdiv><sc-if value=\"{{ r.conflict }}\" hint-placeholder-val=\"{{ false }}\"><div title=\"Synced from another device — tap to review\" style=\"width:8px; height:8px; border-radius:50%; background:#e0a32e; flex:0 0 auto;\"><\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n                <div style=\"font-size:12px; color:var(--fw-muted); margin-top:3px;\">{{ r.meta }}<\u002Fdiv>\n                <div style=\"font-size:12px; color:var(--fw-muted); margin-top:2px;\">CR {{ r.rating }} / {{ r.slope }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:12px; flex:0 0 auto;\">\n                <div style=\"width:64px; text-align:right; flex:0 0 auto;\"><div style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:19px;\">{{ r.score }}<\u002Fdiv><div style=\"font-size:12px; color:var(--fw-muted);\">{{ r.diffLabel }}<\u002Fdiv><\u002Fdiv>\n                <svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"#c2ccbf\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:0 0 auto;\"><polyline points=\"9,6 15,12 9,18\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ noRounds }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center; color:var(--fw-muted); padding:60px 20px; font-size:14px;\">No rounds yet. Tap <b>Add round<\u002Fb> to log your first score.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ STATS ============ -->\n      <sc-if value=\"{{ isStats }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"fw-scroll\" style=\"height:calc(100% - 84px); overflow-y:auto; padding:6px 22px 20px;\">\n        <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:26px; letter-spacing:-0.01em; padding:8px 0 14px;\">Stats<\u002Fdiv>\n        <div style=\"background:var(--fw-card); border-radius:22px; padding:20px; box-shadow:0 1px 3px rgba(20,32,26,0.06);\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n            <span style=\"font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:var(--fw-muted); font-weight:600;\">Index over time<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--fw-muted);\">{{ chartRangeLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div ref=\"{{ scrubRef }}\" data-scrub=\"1\" style=\"position:relative; margin-top:14px; touch-action:none; cursor:crosshair;\">\n            <svg viewBox=\"0 0 320 130\" style=\"width:100%; height:130px; display:block;\" preserveAspectRatio=\"none\">\n              <polyline points=\"{{ statSparkArea }}\" fill=\"color-mix(in oklab, var(--accent,oklch(0.63 0.13 158)) 9%, transparent)\" stroke=\"none\"><\u002Fpolyline>\n              <polyline points=\"{{ statSpark }}\" fill=\"none\" stroke=\"var(--accent,oklch(0.63 0.13 158))\" stroke-width=\"2.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n            <\u002Fsvg>\n            <sc-if value=\"{{ scrubActive }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"position:absolute; top:0; bottom:0; left:{{ scrubX }}; width:2px; background:repeating-linear-gradient(to bottom, var(--fw-scrub) 0 4px, transparent 4px 9px); transform:translateX(-1px); pointer-events:none;\"><\u002Fdiv>\n              <div style=\"position:absolute; left:{{ scrubX }}; top:{{ scrubDotTop }}; width:10px; height:10px; border-radius:50%; background:var(--accent,oklch(0.63 0.13 158)); border:2px solid var(--fw-card); transform:translate(-50%,-50%); pointer-events:none;\"><\u002Fdiv>\n              <div style=\"position:absolute; top:-6px; left:{{ scrubX }}; transform:translateX(-50%); background:var(--accent,oklch(0.63 0.13 158)); color:#fff; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:12px; padding:3px 7px; border-radius:7px; pointer-events:none; white-space:nowrap;\">{{ scrubValue }}<\u002Fdiv>\n              <div style=\"position:absolute; bottom:-6px; left:{{ scrubX }}; transform:translateX(-50%); background:var(--fw-text); color:var(--fw-bg); font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:10px; padding:3px 7px; border-radius:7px; pointer-events:none; white-space:nowrap;\">{{ scrubDate }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--fw-faint); margin-top:4px;\"><span>{{ chartStart }}<\u002Fspan><span>{{ chartEnd }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:5px; margin-top:11px; font-size:10.5px; color:var(--fw-faint); line-height:1.3;\">\n            <svg viewBox=\"0 0 24 24\" width=\"12\" height=\"12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:0 0 auto;\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n            <span>Conforms to USGA/WHS Standards<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:14px;\">\n          <sc-for list=\"{{ statCards }}\" as=\"s\" hint-placeholder-count=\"6\">\n            <div onclick=\"{{ s.onOpen }}\" style=\"background:var(--fw-card); border-radius:14px; padding:11px 10px; box-shadow:0 1px 3px rgba(20,32,26,0.05); cursor:{{ s.cursor }};\">\n              <div style=\"font-size:9px; letter-spacing:0.05em; text-transform:uppercase; color:var(--fw-muted); font-weight:600; line-height:1.2;\">{{ s.label }}<\u002Fdiv>\n              <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px; margin-top:6px; letter-spacing:-0.01em; color:var(--accent,oklch(0.63 0.13 158));\">{{ s.value }}<\u002Fdiv>\n              <div style=\"font-size:9px; color:var(--fw-faint); margin-top:2px; line-height:1.25; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">{{ s.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div data-ach=\"1\" style=\"font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:17px; margin-top:24px; margin-bottom:2px; display:flex; justify-content:space-between; align-items:baseline;\"><span>Achievements<\u002Fspan><span style=\"font-size:12px; font-weight:600; color:var(--accent,oklch(0.63 0.13 158));\">{{ badgeEarnedLabel }}<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:12px; color:var(--fw-muted); margin-bottom:12px;\">{{ badgeSub }}<\u002Fdiv>\n        <div style=\"background:var(--fw-card); border-radius:18px; padding:20px 16px 26px; box-shadow:0 1px 3px rgba(20,32,26,0.05); display:grid; grid-template-columns:repeat(3,1fr); gap:20px 8px;\">\n          <sc-for list=\"{{ badgesShown }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; flex-direction:column; align-items:center; gap:7px; opacity:{{ b.op }};\">\n              <div style=\"width:60px; height:60px; border-radius:18px; background:{{ b.tile }}; color:{{ b.ink }}; box-shadow:{{ b.tsh }}; display:flex; align-items:center; justify-content:center; flex:0 0 auto;\">\n                <sc-if value=\"{{ b.isRounds }}\" hint-placeholder-val=\"{{ false }}\"><svg viewBox=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 21V4M5 4h11l-2 4 2 4H5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                <sc-if value=\"{{ b.isScore }}\" hint-placeholder-val=\"{{ false }}\"><svg viewBox=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"8\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><\u002Fsvg><\u002Fsc-if>\n                <sc-if value=\"{{ b.isIndex }}\" hint-placeholder-val=\"{{ false }}\"><svg viewBox=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"3,7 9,13 13,9 21,17\"><\u002Fpolyline><polyline points=\"21,12 21,17 16,17\"><\u002Fpolyline><\u002Fsvg><\u002Fsc-if>\n                <sc-if value=\"{{ b.isGoal }}\" hint-placeholder-val=\"{{ false }}\"><svg viewBox=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M8 21h8M12 17v4M7 4h10v4a5 5 0 0 1-10 0V4z\"><\u002Fpath><path d=\"M7 6H4v1a3 3 0 0 0 3 3M17 6h3v1a3 3 0 0 1-3 3\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-size:11px; font-weight:600; text-align:center; line-height:1.2; color:var(--fw-text);\">{{ b.name }}<\u002Fdiv>\n              <div style=\"font-size:10px; color:var(--fw-faint); text-align:center;\">{{ b.status }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showBadgeToggle }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex; justify-content:center; margin-top:-16px;\">\n            <div onclick=\"{{ toggleBadges }}\" style=\"width:32px; height:32px; border-radius:50%; background:var(--fw-card); border:1px solid var(--fw-line,rgba(20,32,26,0.08)); box-shadow:0 2px 5px rgba(20,32,2 Fsc-if>\n          <sc-if value=\"{{ isEditNew }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"width:48px;\"><\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <!-- steps indicator -->\n        <div style=\"display:flex; gap:6px; padding:4px 22px 12px;\">\n          <div style=\"flex:1; height:4px; border-radius:3px; background:{{ step1Color }};\"><\u002Fdiv>\n          <div style=\"flex:1; height:4px; border-radius:3px; background:{{ step2Color }};\"><\u002Fdiv>\n          <div style=\"flex:1; height:4px; border-radius:3px; background:{{ step3Color }};\"><\u002Fdiv>\n          <div style=\"flex:1; height:4px; border-radius:3px; background:{{ step4Color }};\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"fw-scroll\" style=\"flex:1; overflow-y:auto; padding:6px 22px 24px;\">\n\n          <!-- step 1: course -->\n          <sc-if value=\"{{ atStep1 }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fw-muted); font-weight:600; margin-bottom:12px;\">Select course<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:10px;\">\n              <sc-for list=\"{{ courseChoices }}\" as=\"c\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ c.onSelect }}\" style=\"display:flex; justify-content:space-between; align-items:center; background:{{ c.bg }}; border:1.5px solid {{ c.border }}; border-radius:16px; padding:16px 18px; cursor:pointer;\">\n                  <div><div style=\"font-weight:600; font-size:15px;\">{{ c.name }}<\u002Fdiv><div style=\"font-size:12px; color:var(--fw-muted); margin-top:2px;\">{{ c.loc }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"font-size:12px; color:var(--fw-faint);\">{{ c.teeCount }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- step 2: tee -->\n          <sc-if value=\" adius:14px; border:1.5px solid var(--fw-border); background:var(--fw-card); outline:none;\">\n              <div onclick=\"{{ doneEditScan }}\" style=\"margin-top:12px; text-align:center; padding:13px; border-radius:14px; background:var(--accent,oklch(0.63 0.13 158)); color:#fff; font-weight:600; font-size:15px; cursor:pointer;\">Done<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ scanNotEditing }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex; align-items:center; gap:10px; background:var(--fw-card); border:1.5px solid var(--fw-border); border-radius:14px; padding:13px 14px;\">\n                <span style=\"flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--fw-mid);\">{{ scanUrlDisplay }}<\u002Fspan>\n                <div onclick=\"{{ startEditScan }}\" style=\"flex-shrink:0; display:flex; align-items:center; gap:5px; color:var(--accent,oklch(0.63 0.13 158)); font-weight:600; font-size:13px; cursor:pointer;\"><svg viewBox=\"0 0 24 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7\"><\u002Fpath><path d=\"M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z\"><\u002Fpath><\u002Fsvg>Edit<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div onclick=\"{{ closeScanSettings }}\" style=\"margin-top:18px; text-align:center; padding:14px; border-radius:14px; background:var(--fw-soft2); color:var(--fw-mid); font-weight:600; font-size:15px; cursor:pointer;\">Close<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- scorecard scan verification sheet -->\n      <sc-if value=\"{{ showScanVerify }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closeScanVerify }}\" style=\"position:absolute; 0.05em; text-transform:uppercase; color:var(--fw-muted); font-weight:700; margin:12px 0 6px;\">Golfer<\u002Fdiv>\n                  <select value=\"{{ row.assignVal }}\" onchange=\"{{ row.onAssign }}\" style=\"width:100%; box-sizing:border-box; padding:11px 12px; border-radius:11px; border:1.5px solid var(--fw-border); background:var(--fw-bg); color:var(--fw-text); font-size:14px; font-weight:600; appearance:none; -webkit-appearance:none;\">\n                    <sc-for list=\"{{ row.golferOpts }}\" as=\"o\" hint-placeholder-count=\"2\">\n                      <option value=\"{{ o.id }}\">{{ o.name }}<\u002Foption>\n                    <\u002Fsc-for>\n                  <\u002Fselect>\n                  <sc-if value=\"{{ row.hasTees }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"font-size:11px; letter-spacing:0.05em; text-transform:uppercase; color:var(--fw-muted); font-weight:700; margin:12px 0 6px;\">Tee<\u002Fdiv>\n                    <select value=\"{{ row.teeVal }}\" onchange=\"{{ row.onTee }}\" style=\"width:100%; box-sizing:border-box; padding:11px 12px; border-radius:11px; border:1.5px solid var(--fw-border); background:var(--fw-bg); color:var(--fw-text); font-size:14px; font-weight:600; appearance:none; -webkit-appearance:none;\">\n                      <sc-for list=\"{{ row.teeOpts }}\" as=\"t\" hint-placeholder-count=\"3\">\n                        <option value=\"{{ t.id }}\">{{ t.name }}<\u002Foption>\n                      <\u002Fsc-for>\n                    <\u002Fselect>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:10px; margin-top:16px; flex:0 0 auto;\">\n              <div onclick=\"{{ closeScanVerify }}\" style=\"flex:1; text-align:center; padding:14px; border-radius:14px; background:var(--fw-soft2); color:var(--fw-mid); font-weight:600; font-size:15px; cursor:pointer;\">Cancel<\u002Fdiv>\n              <d ospace; font-size:11px; color:var(--fw-text); padding:11px 12px; border-radius:12px; border:1.5px solid var(--fw-border); background:var(--fw-card); outline:none; resize:none;\"><\u002Ftextarea>\n            <sc-if value=\"{{ importMsg }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:12px; color:#b04a3a; margin-top:8px;\">{{ importMsg }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex; gap:10px; margin-top:14px;\">\n              <div onclick=\"{{ closeBackup }}\" style=\"flex:1; text-align:center; padding:14px; border-radius:14px; background:var(--fw-soft2); color:var(--fw-mid); font-weight:600; font-size:15px; cursor:pointer;\">Close<\u002Fdiv>\n              <div onclick=\"{{ doImport }}\" style=\"flex:1; text-align:center; padding:14px; border-radius:14px; background:#0f2e1f; color:#fff; font-weight:600; font-size:15px; cursor:pointer;\">Restore<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- share course dialog -->\n      <sc-if value=\"{{ showCourseShare }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closeCourseShare }}\" style=\"position:absolute; inset:0; z-index:35; background:rgba(13,20,16,0.34); display:flex; align-items:center; justify-content:center; padding:24px;\">\n          <div onclick=\"{{ stopProp }}\" style=\"background:var(--fw-bg); border-radius:24px; padding:22px; width:100%; max-width:330px; box-shadow:0 18px 50px rgba(0,0,0,0.28);\">\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:19px;\">Share {{ shareCourseName }}<\u002Fdiv>\n\n            <sc-if value=\"{{ shareDone }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex; flex-direction:column; align-items:center; padding:22px 0 8px;\">\n                <div style=\"width:54px; height:54px; border-radius:50%; background:var(--accent,oklch(0.63 0.13 158)); display:flex align-items:center; justify-content:center; padding:24px;\">\n          <div onclick=\"{{ stopProp }}\" style=\"background:var(--fw-bg); border-radius:24px; padding:22px; width:100%; max-width:310px; box-shadow:0 18px 50px rgba(0,0,0,0.3);\">\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:19px; color:var(--fw-text);\">Goal Reached!<\u002Fdiv>\n            <div style=\"font-size:13px; color:var(--fw-muted); margin-top:6px; line-height:1.45;\">Your index ({{ goalPromptIndex }}) is now below your goal of {{ goalPromptOld }}. Set a new goal?<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:8px; margin-top:16px;\">\n              <sc-for list=\"{{ goalSuggestions }}\" as=\"s\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ s.onSet }}\" style=\"display:flex; align-items:center; justify-content:space-between; background:var(--fw-card); border:1.5px solid var(--fw-border); border-radius:14px; padding:14px 16px; cursor:pointer;\">\n                  <span style=\"font-size:13px; color:var(--fw-muted); font-weight:600;\">New goal<\u002Fspan>\n                  <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px; color:var(--accent,oklch(0.63 0.13 158));\">{{ s.label }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div onclick=\"{{ dismissGoalPrompt }}\" style=\"margin-top:14px; text-align:center; padding:13px; border-radius:14px; background:var(--fw-soft2); color:var(--fw-mid); font-weight:600; font-size:15px; cursor:pointer;\">Keep current goal<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- add golfer dialog -->\n      <sc-if value=\"{{ showAddGolfer }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ closeAddGolfer }}\" style=\"position:absolute; inset:0; z-index:34; background:rgba(13,20,16,0.34); display:flex; align-items:center; justify-content:center; padding:24px;\">\n          <div onclick=\"{{ stopProp }}\" style=\"background:var(--fw-bg); border-radius:24px; padding:22px; width:100%; max-width:300px; box-shadow:0 18px 50px rgba(0,0,0,0.28);\">\n            <div style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:19px;\">Add to Round<\u002Fdiv>\n            <sc-if value=\"{{ hasGroupBuddies }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:13px; color:var(--fw-muted); margin-top:4px;\">Tap a buddy to include them — they'll get the round to confirm.<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:8px; margin-top:14px;\">\n                <sc-for list=\"{{ groupBuddyRows }}\" as=\"b\" hint-placeholder-count=\"0\">\n                  <div onclick=\"{{ b.add }}\" style=\"display:flex; align-items:center; gap:10px; background:var(--fw-card); border:1.5px solid var(--fw-border); border-radius:14px; padding:11px 13px; cursor:pointer;\">\n                    <div style=\"width:32px; height:32px; border-radius:50%; background:var(--fw-avatar); display:flex; align-items:center; justify-content:center; color:var(--fw-mid); font-weight:700; font-size:13px; flex:0 0 auto;\">{{ b.initial }}<\u002Fdiv>\n                    <div style=\"flex:1; min-width:0; font-weight:600; font-size:14.5px; color:var(--fw-text);\">{{ b.name }}<\u002Fdiv>\n                    <span style=\"font-size:18px; color:var(--accent,oklch(0.63 0.13 158)); font-weight:700;\">+<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"font-size:12px; color:var(--fw-faint); margin:16px 0 4px; text-align:center;\">or add a guest (not a Scratch user)<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noGroupBuddies }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size:13px; color:var(--fw-muted); margin-top:4px;\">A guest is scored in this round only.<\u002Fdiv>\n            <\u002Fsc-if>\n            <input value=\"{{ addGolferName }}\" oninput=\"{{ onAddGolferName }}\" placeholder=\"Guest name\" style=\"width:100%; box-sizing:border-box; margin-top:14px; font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:600; padding:14px 16px; border-radius:16px; border:1.5px solid var(--fw-border); background:var(--fw-card); outline:none; color:var(--fw-text);\">\n            <div style=\"display:flex; gap:10px; margin-top:18px;\">\n              <div onclick=\"{{ closeAddGolfer }}\" style=\"flex:1; text-align:center; padding:14px; border-radius:14px; background:var(--fw-soft2); color:var(--fw-mid); font-weight:600; font-size:15px; cursor:pointer;\">Cancel<\u002Fdiv>\n              <div onclick=\"{{ saveAddGolfer }}\" style=\"flex:1; text-align:center; padding:14px; border-radius:14px; background:var(--accent,oklch(0.63 0.13 158)); color:#fff; font-weight:600; font-size:15px; cursor:pointer;\">Add Guest<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- first-run onboarding -->\n      <sc-if value=\"{{ isOnboarding }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; inset:0; z-index:60; background:var(--fw-bg); display:flex; flex-direction:column; padding:0 26px;\">\n          <div style=\"flex:0 0 auto; padding-top:60px; display:flex; align-items:center; gap:9px;\">\n            <div style=\"width:30px; height:30px; border-radius:9px; background:var(--accent,oklch(0.63 0.13 158)); display:flex; align-items:center; justify-content:center;\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2v20M2 12h20\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px; letter-spacing:-0.02em; color:var(--f 24\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n                Found {{ addPhotoMatchName }} — we'll skip to your scores.\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ addPhotoIsNew }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:12.5px; color:var(--fw-muted); margin:2px 0 14px;\">New course — add the city and state and we'll scan its scorecard to create it.<\u002Fdiv>\n              <div style=\"font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--fw-muted); font-weight:700; margin-bottom:7px;\">City, State<\u002Fdiv>\n              <input value=\"{{ addPhotoLoc }}\" oninput=\"{{ onAddPhotoLoc }}\" placeholder=\"e.g. Austin, TX\" style=\"width:100%; box-sizing:border-box; padding:13px 16px; border-radius:14px; border:1.5px solid var(--fw-border); background:var(--fw-card); font-size:15px; outline:none; color:var(--fw-text); margin-bottom:18px;\">\n            <\u002Fsc-if>\n            <div onclick=\"{{ submitAddPhotoCourse }}\" style=\"display:flex; align-items:center; justify-content:center; gap:9px; padding:15px; border-radius:16px; background:oklch(0.63 0.13 158); color:#fff; font-weight:700; font-size:15px; cursor:pointer;\">\n              <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z\"><\u002Fpath><circle cx=\"12\" cy=\"13\" r=\"4\"><\u002Fcircle><\u002Fsvg>\n              {{ addPhotoBtnLabel }}\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- scanned course verify / edit sheet -->\n      <sc-if value=\"{{ showCourseVerify }}\" hint-placeholder-val= nt-size:10px; font-weight:700; color:var(--fw-faint); text-transform:uppercase;\">SI<\u002Fdiv>\n                  <sc-for list=\"{{ cvTeeCols }}\" as=\"c\" hint-placeholder-count=\"3\">\n                    <div style=\"width:56px; flex:0 0 auto; font-size:10px; font-weight:700; color:var(--fw-faint); text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ c.name }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <sc-for list=\"{{ cvHoles }}\" as=\"h\" hint-placeholder-count=\"6\">\n                  <div style=\"display:flex; gap:6px; align-items:center; margin-bottom:6px;\">\n                    <div style=\"width:34px; flex:0 0 auto; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px; color:var(--fw-text);\">{{ h.hole }}<\u002Fdiv>\n                    <input value=\"{{ h.par }}\" oninput=\"{{ h.onPar }}\" inputmode=\"numeric\" style=\"width:46px; flex:0 0 auto; box-sizing:border-box; padding:8px 6px; border-radius:8px; border:1.5px solid var(--fw-border); background:var(--fw-card); font-size:14px; text-align:center; outline:none; color:var(--fw-text);\">\n                    <input value=\"{{ h.si }}\" oninput=\"{{ h.onSi }}\" inputmode=\"numeric\" style=\"width:46px; flex:0 0 auto; box-sizing:border-box; padding:8px 6px; border-radius:8px; border:1.5px solid var(--fw-border); background:var(--fw-card); font-size:14px; text-align:center; outline:none; color:var(--fw-text);\">\n                    <sc-for list=\"{{ h.yards }}\" as=\"y\" hint-placeholder-count=\"3\">\n                      <input value=\"{{ y.val }}\" oninput=\"{{ y.onInput }}\" inputmode=\"numeric\" placeholder=\"–\" style=\"width:56px; flex:0 0 auto; box-sizing:border-box; padding:8px 6px; border-radius:8px; border:1.5px solid var(--fw-border); background:var(--fw-card); font-size:13px; text-align:center; outline:none; color:var(--fw-text);\">\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- hidden scorecard camera input -->\n      <input type=\"file\" accept=\"image/*\" capture=\"environment\" ref=\"{{ scoreCamRef }}\" onchange=\"{{ onScorecardPhoto }}\" style=\"display:none;\">\n\n      <!-- ============ HOME ============ -->\n      <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n      <div class=\"fw-scroll\" style=\"height:calc(100% - 84px); overflow:hidden; display:flex; flex-direction:column; padding:6px 22px 6px;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:center; padding:6px 0 4px; flex:0 0 auto;\">\n          <span style=\"font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:21px; letter-spacing:-0.02em;\">Scratch<\u002Fspan>\n          <div style=\"display:flex; align-items:center; gap:10px;\">\n            <div onclick=\"{{ openSwitcher }}\" style=\"display:flex; align-items:center; gap:5px; cursor:pointer;\">\n            <sc-if value=\"{{ hasActivePic }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"width:36px; height:36px; border-radius:50%; background-image:{{ activePicCss }}; background-size:cover; background-position:center; background-color:var(--fw-avatar);\"><\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ noActivePic }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"width:36px; height:36px; border-radius:50%; background:var(--fw-avatar); color:var(--fw-mid); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px;\">{{ initials }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\"><polyline points=\"6,9 12,15 18,9\" fill=\"none\" stroke=\"#9aa89f\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg>\n          <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- hero -->\n        <div style=\"margin-top:14px; background:#0f2e1f; background-image:radial-gradient(circle at center, rgba(255,255,255,0.07) 1.4px, transparent 1.7px); background-size:16px 16px; border-radius:28px; padding:22px 24px; position:relative; overflow:hidden; box-shadow:0 16px 34px rgba(15,46,31,0.34); flex:0 0 auto;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n            <span style=\"font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:rgba(255,255,255,0.55); font-weight:600;\">Handicap Index<\u002Fspan>\n            <span style=\"background:oklch(0.88 0.19 122); color:#0f2417; font-size:12px; font-weight:700; padding:4px 11px; border-radius:20px;\">{{ trendLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk',sans-serif; font-size:74px; font-weight:700; line-height:0.9; letter-spacing:-0.03em; margin-top:10px; color:#ffffff;\">{{ indexDisplay }}<\u002Fdiv>\n          <div style=\"font-size:13px; color:rgba(255,255,255,0.6); margin-top:8px;\">{{ indexSub }}<\u002Fdiv>\n          <svg viewBox=\"0 0 300 72\" style=\"width:100%; height:56px; margin-top:14px;\" preserveAspectRatio=\"none\">\n            <polyline points=\"{{ homeSparkArea }}\" fill=\"color-mix(in oklab, oklch(0.88 0.19 122) 16%, transparent)\" stroke=\"none\"><\u002Fpolyline>\n            <polyline points=\"{{ homeSpark }}\" fill=\"none\" stroke=\"oklch(0.88 0.19 122)\" stroke-width=\"2.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n          <\u002Fsvg>\n          <div style=\"display:flex; align-items:center; gap:5px; margin-top:10px; font-size:9.5px; color:rgba(255,255,255,0.5); line-height:1.3; white-space:nowrap;\">\n            <svg viewBox=\"0 0 24 24\" width=\"11\" height=\"11\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"r par) { const pars = (nc.holes || []).map(h => h.par).filter(Boolean); nc.par = pars.length ? pars.reduce((a, b) => a + b, 0) : 72; }\n          this.persist({ ...this.state.data, courses: [...courses, nc] });\n          this.setState({ expandedCities: { ...this.state.expandedCities, [this.cityKey(nc.loc)]: true } });\n        }\n      }\n      await this.supa.from('posted_courses').update({ status: 'accepted' }).eq('id', post.id);\n      await this.refreshCourseInbox();\n    } catch (e) {}\n  }\n  async declinePostedCourse(post) { if (!this.supa) return; try { await this.supa.from('posted_courses').update({ status:'declined' }).eq('id', post.id); await this.refreshCourseInbox(); } catch (e) {} }\n\n  // ---------- QR code + scanner + deep link ----------\n  genMyQR() {\n    const uid = this.state.cloud.user && this.state.cloud.user.id; const prof = this.state.cloud.profile;\n    if (!uid || typeof qrcode === 'undefined') return;\n    const payload = location.origin + location.pathname + '?buddy=' + uid + '&h=' + encodeURIComponent(prof ? prof.handle : '');\n    try { const qr = qrcode(0, 'M'); qr.addData(payload); qr.make(); this.setState({ myQR: qr.createDataURL(6, 0) }); } catch (e) {}\n  }\n  handleBuddyLink() {\n    try {\n      const p = new URLSearchParams(location.search); const bid = p.get('buddy');\n      if (bid && this.state.cloud.user && bid !== this.state.cloud.user.id) { this.sendBuddyRequest(bid, true).then(() => this.setState({ showAccount: true })); }\n      if (bid) { history.replaceState({}, '', location.origin + location.pathname); }\n    } catch (e) {}\n  }\n  async openQRScan() {\n    this.setState({ showQRScan: true, qrScanMsg: 'Point at your buddy\\u2019s QR code' });\n    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { this.setState({ qrScanMsg: 'Camera unavailable on this device. Use search instead.' }); return; }\n    try {\n      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });\n      this._qrStream = stream; const v = this.qrVideoRef.current;\n      if (v) { v.srcObject = stream; v.setAttribute('playsinline', 'true'); v.muted = true; await v.play(); this.qrScanLoop(); }\n    } catch (e) { this.setState({ qrScanMsg: 'Couldn\\u2019t open the camera. Use search instead.' }); }\n  }\n  qrScanLoop() {\n    const v = this.qrVideoRef.current; if (!v || !this.state.showQRScan) return;\n    if (v.readyState >= 2 && v.videoWidth && window.jsQR) {\n      try {\n        const c = document.createElement('canvas'); c.width = v.videoWidth; c.height = v.videoHeight;\n        const ctx = c.getContext('2d'); ctx.drawImage(v, 0, 0, c.width, c.height);\n        const img = ctx.getImageData(0, 0, c.width, c.height); const code = window.jsQR(img.data, img.width, img.height);\n        if (code && code.data) { this.onQRDecoded(code.data); return; }\n      } catch (e) {}\n    }\n    this._qrScanRAF = requestAnimationFrame(() => this.qrScanLoop());\n  }\n  onQRDecoded(text) {\n    let bid = null; try { const u = new URL(text); bid = u.searchParams.get('buddy'); } catch (e) { const m = /buddy=([0-9a-fA-F-]+)/.exec(text); if (m) bid = m[1]; }\n    if (bid && this.state.cloud.user && bid !== this.state.cloud.user.id) { this.closeQRScan(); this.setState({ showAddBuddy: false }); this.sendBuddyRequest(bid, true); }\n    else { this.setState({ qrScanMsg: 'That isn\\u2019t a Scratch buddy code.' }); this._qrScanRAF = requestAnimationFrame(() => this.qrScanLoop()); }\n  }\n  closeQRScan() { this.setState({ showQRScan: false }); if (this._qrScanRAF) cancelAnimationFrame(this._qrScanRAF); if (this._qrStream) { try { this._qrStream.getTracks().forEach(t => t.stop()); } catch (e) {} this._qrStream = null; } }\n  openAccount() { this.setState({ showAccount: true, showSettings: false, showSwitcher: false }); setTimeout(() => this.genMyQR(), 60); }\n  openAddBuddy() { this.setState({ showAddBuddy: true, buddyTab: 'qr', buddyQuery: '', buddyResults: [], buddySearchMs rses = Object.keys(byId).map(k => byId[k]);\n    } catch (e) {}\n    this.persist(obj);\n    this.setState({ showBackup: false, importText: '', importMsg: '', showSwitcher: false, screen: 'home' });\n  }\n  saveBackupFile() {\n    try {\n      const data = JSON.stringify(this.state.data, null, 2);\n      const blob = new Blob([data], { type: 'application/json' });\n      const url = URL.createObjectURL(blob);\n      const d = new Date();\n      const pad = n => String(n).padStart(2, '0');\n      const fname = 'scratch-backup-' + d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + '.json';\n      const a = document.createElement('a');\n      a.href = url; a.download = fname;\n      document.body.appendChild(a); a.click();\n      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1500);\n    } catch (e) { window.alert('Could not save the file on this device. Use \"Copy backup code\" instead.'); }\n  }\n  pickBackupFile() { if (this.backupFileRef && this.backupFileRef.current) this.backupFileRef.current.click(); }\n  onBackupFile(e) {\n    const file = e && e.target && e.target.files && e.target.files[0];\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = () => {\n      let obj = null;\n      const t = String(reader.result || '').trim();\n      try { obj = JSON.parse(t); } catch (err) { try { obj = JSON.parse(decodeURIComponent(escape(atob(t)))); } catch (e2) { obj = null; } }\n      this.applyImportObj(obj);\n    };\n    reader.onerror = () => this.setState({ importMsg: 'Could not read that file.' });\n    reader.readAsText(file);\n    try { e.target.value = ''; } catch (er) {}\n  }\n\n  // ---------- course sharing ----------\n  courseShareCode(course) {\n    try { return btoa(unescape(encodeURIComponent(JSON.stringify({ t: 'scratch-course', v: 1, course: course })))); } catch (e) { return ''; }\n  }\n  shareCourse(id) {\n    const c = (this.state.data.courses || []).find(x => x.id === id me, onTap: () => this.setState({ cmpA: e.id }),\n        bg: e.id === a ? ACC : 'var(--fw-card)', fg: e.id === a ? '#fff' : 'var(--fw-mid)', border: e.id === a ? ACC : '#dde3dc' }; });\n      out.cmpChipsB = entries.map(e => { const s = this.summaryFor(e.id); return { name: s.name, onTap: () => this.setState({ cmpB: e.id }),\n        bg: e.id === b ? 'oklch(0.82 0.18 123)' : 'var(--fw-card)', fg: e.id === b ? '#0f2417' : 'var(--fw-mid)', border: e.id === b ? 'oklch(0.82 0.18 123)' : '#dde3dc' }; });\n      const sa = this.summaryFor(a), sb = this.summaryFor(b);\n      const fmt = (v, d) => v == null ? '—' : v.toFixed(d);\n      const rowsDef = [\n        { label: 'Handicap Index', a: fmt(sa.index, 1), b: fmt(sb.index, 1), av: sa.index, bv: sb.index, lowBetter: true },\n        { label: 'Scoring average', a: fmt(sa.avg, 1), b: fmt(sb.avg, 1), av: sa.avg, bv: sb.avg, lowBetter: true },\n        { label: 'Best differential', a: fmt(sa.best, 1), b: fmt(sb.best, 1), av: sa.best, bv: sb.best, lowBetter: true },\n        { label: 'Low Index', a: fmt(sa.low, 1), b: fmt(sb.low, 1), av: sa.low, bv: sb.low, lowBetter: true },\n        { label: 'Rounds played', a: '' + sa.rounds, b: '' + sb.rounds, av: sa.rounds, bv: sb.rounds, lowBetter: false },\n      ];\n      out.cmpName = sa.name; out.cmpNameB = sb.name;\n      out.cmpRows = rowsDef.map(r => {\n        let aWin = false, bWin = false;\n        if (r.av != null && r.bv != null && r.av !== r.bv) { const aBetter = r.lowBetter ? r.av < r.bv : r.av > r.bv; aWin = aBetter; bWin = !aBetter; }\n        return { label: r.label, a: r.a, b: r.b,\n          aColor: ACC, aWeight: aWin ? '700' : '600',\n          bColor: 'oklch(0.74 0.17 124)', bWeight: bWin ? '700' : '600' };\n      });\n      const va = sa.series.slice(-12).map(s => s.value), vb = sb.series.slice(-12).map(s => s.value);\n      const all = va.concat(vb);\n      if (all.length >= 2) {\n        const mn = Math.min(...all), mx = Math.max(...all), rg = (mx - mn) || 1;\n        const line = (vals) => { if (vals.length < 2) return ''; const step = 320 / (vals.length - 1); return vals.map((v, i) => (i * step).toFixed(1) + ',' + (12 + (mx - v) / rg * 106).toFixed(1)).join(' '); };\n        out.cmpLineA = line(va); out.cmpLineB = line(vb); out.cmpHasChart = (va.length >= 2 || vb.length >= 2);\n      } else { out.cmpLineA = ''; out.cmpLineB = ''; out.cmpHasChart = false; }\n    }\n\n    return out;\n  }\n\n  navItems(active) {\n    const items = [ { key: 'home', label: 'Home' }, { key: 'rounds', label: 'Rounds' }, { key: 'stats', label: 'Stats' }, { key: 'compare', label: 'Compare' }, { key: 'courses', label: 'Courses' } ];\n    const ACC = 'var(--accent,oklch(0.63 0.13 158))';\n    return items.map(it => {\n      const on = active === it.key;\n      return { onClick: () => this.go(it.key),\n        isHome: it.key === 'home', isRounds: it.key === 'rounds', isStats: it.key === 'stats', isCompare: it.key === 'compare', isCourses: it.key === 'courses',\n        color: on ? 'oklch(0.88 0.19 122)' : 'rgba(255,255,255,0.55)' };\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
